[package]
name = "l3"
version = "0.0.1"
edition = "2021"

[dependencies]
anyhow = "1.0.86"
aws-config = "1.5.5"
aws-sdk-apigatewayv2 = "1.37.0"
aws-sdk-iam = "1.39.0"
aws-sdk-lambda = "1.38.0"
base64 = "0.22.1"
clap = { version = "4.5.15", features = ["derive"] }
crossterm = "0.28.1"
lazy_static = "1.5.0"
notify = {version = "6.1.1", default-features = false, features = ["macos_fsevent"]}
regex = "1.10.6"
serde_json = "1.0.124"
sha2 = "0.10.8"
swc = "0.283.0"
swc_common = { version = "0.37.2", features = ["concurrent"] }
# do not upgrade swc_ecma_ast to 0.118.1
swc_ecma_ast = "0.118.0"
swc_ecma_parser = { version = "0.149.0", features = ["typescript"] }
tokio = { version = "1.39.2", features = ["full"] }
toml = "0.8.19"
yaml-rust = "0.4.5"
zip = "2.1.6"

[dev-dependencies]
temp-dir = "0.1.13"
